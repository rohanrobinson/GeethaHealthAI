name: GeethaHealth
options:
  bundleIdPrefix: com.geethahealth
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  GeethaHealth:
    type: application
    platform: iOS
    sources:
      - GeethaHealth
    entitlements:
      path: GeethaHealth/GeethaHealth.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Geetha Health
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: Geetha Health uses the camera to scan paper medical documents into your record.
        INFOPLIST_KEY_NSHealthShareUsageDescription: Geetha Health reads the health records you choose from Apple Health to add them to your on-device medical record. Nothing is uploaded or shared.
        INFOPLIST_KEY_NSHealthClinicalHealthRecordsShareUsageDescription: Geetha Health imports the clinical records you choose (conditions, medications, allergies, and immunizations) from Apple Health into your on-device medical record. Nothing is uploaded or shared.
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: Geetha Health does not write data to Apple Health. This permission is unused.
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: 3Z8928HS54
        CODE_SIGN_STYLE: Automatic
